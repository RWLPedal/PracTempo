<!DOCTYPE html>
<html data-theme="warm">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PracTempo — Reference</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="./js/reference_bundle.js" defer></script>
  <link rel="stylesheet" href="style/theme-tokens.css">
  <link rel="stylesheet" href="style/style.css">
</head>

<body>
  <div class="reference-layout">
    <div id="side-bar" class="side-bar-container">
      <!-- Sidebar content will be generated here -->
    </div>
    <div id="main-content" class="main-content-container">
      <!-- Floating views will be appended here -->
    </div>
  </div>

  <div id="floating-view-area"></div>

  <div id="overlay" class="hidden"></div>

  <!-- Audio elements for metronome (queried by FloatingMetronomeView) -->
  <audio id="metronome-sound" src="sounds/metronome.wav" preload="auto"></audio>
  <audio id="metronome-accent-sound" src="sounds/metronome_accent.wav" preload="auto"></audio>
</body>
</html>
